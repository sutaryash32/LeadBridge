server:
  port: 8081

spring:
  application:
    name: leadbridge-tenant-service
  datasource:
    url: jdbc:postgresql://localhost:5439/leadbridge?TimeZone=Asia/Kolkata
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/leadbridge
  flyway:
    enabled: true
    validate-on-migrate: false
    baseline-on-migrate: true
    out-of-order: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

keycloak:
  server-url: http://localhost:8180
  realm: master
  client-id: admin-cli
  username: admin
  password: admin

management:
  endpoints:
    web:
      exposure:
        include: health
