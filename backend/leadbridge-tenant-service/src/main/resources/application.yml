server:
  port: 8081

spring:
  application:
    name: leadbridge-tenant-service
  datasource:
    url: jdbc:postgresql://postgres:5432/leadbridge?TimeZone=Asia/Kolkata
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/leadbridge}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/leadbridge/protocol/openid-connect/certs}
  flyway:
    enabled: true
    validate-on-migrate: false
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history_tenant
    out-of-order: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    prefer-ip-address: true

keycloak:
  server-url: http://keycloak:8080
  realm: master
  client-id: admin-cli
  username: admin
  password: admin

management:
  endpoints:
    web:
      exposure:
        include: health
