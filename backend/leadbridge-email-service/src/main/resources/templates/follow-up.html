<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Follow Up</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
    <div style="background-color: #ffffff; padding: 30px; border-radius: 8px; max-width: 600px; margin: auto;">
        <h2 style="color: #333333;">Hi <span th:text="${leadName}">Lead</span>,</h2>
        <p style="color: #666666;">
            Just following up on our previous conversation. Are you still interested in proceeding? Let us know if you have any questions.
        </p>
        <div style="margin-top: 30px;">
            <p style="color: #666666; font-size: 12px;">Best Regards,<br>The LeadBridge Team</p>
        </div>
    </div>
</body>
</html>
