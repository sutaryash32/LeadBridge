services:
  postgres:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: leadbridge
    ports:
      - "5439:5432"
    networks:
      - leadbridge-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d leadbridge"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.7
    container_name: keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/leadbridge
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: root
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8180
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
    command: start-dev --import-realm
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - leadbridge-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 180s

  discovery-server:
    build:
      context: ../backend
      dockerfile: leadbridge-discovery-server/Dockerfile
    container_name: discovery-server
    ports:
      - "8761:8761"
    networks:
      - leadbridge-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  gateway:
    build:
      context: ../backend
      dockerfile: leadbridge-gateway/Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - leadbridge-network

  tenant-service:
    build:
      context: ../backend
      dockerfile: leadbridge-tenant-service/Dockerfile
    container_name: tenant-service
    environment:
      KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/leadbridge
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/leadbridge/protocol/openid-connect/certs
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - leadbridge-network

  lead-service:
    build:
      context: ../backend
      dockerfile: leadbridge-lead-service/Dockerfile
    container_name: lead-service
    environment:
      KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/leadbridge
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/leadbridge/protocol/openid-connect/certs
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - leadbridge-network

  email-service:
    build:
      context: ../backend
      dockerfile: leadbridge-email-service/Dockerfile
    container_name: email-service
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - leadbridge-network

  report-service:
    build:
      context: ../backend
      dockerfile: leadbridge-report-service/Dockerfile
    container_name: report-service
    ports:
      - "8083:8083"
    environment:
      KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/leadbridge
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/leadbridge/protocol/openid-connect/certs
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - leadbridge-network

  frontend:
    build:
      context: ../frontend
    container_name: leadbridge-frontend
    ports:
      - "4200:80"
    depends_on:
      - gateway
    networks:
      - leadbridge-network

networks:
  leadbridge-network:
    driver: bridge

volumes:
  postgres_data:
