server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy to Gateway for API calls if needed, 
    # though frontend usually calls http://localhost:8080 directly
    # location /api {
    #     proxy_pass http://gateway:8080;
    # }
}
